version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xiaoye-backend
    restart: unless-stopped
    ports:
      - "8092:8092"
    env_file:
      - ./backend/.env.prod
    volumes:
      - ./data/uploads:/app/uploads
    networks:
      - xiaoye-net

networks:
  xiaoye-net:
    driver: bridge
