version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: xiaoye-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: XiaoyeRoot@2026
      MYSQL_DATABASE: xiaoye_ai
      MYSQL_USER: xiaoye_app
      MYSQL_PASSWORD: XiaoyeApp@2026
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - xiaoye-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pXiaoyeRoot@2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xiaoye-backend
    restart: unless-stopped
    ports:
      - "8092:8092"
    env_file:
      - ./backend/.env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HTTP_PROXY=http://host.docker.internal:7890
      - HTTPS_PROXY=http://host.docker.internal:7890
      - ALL_PROXY=socks5://host.docker.internal:7891
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - xiaoye-net

networks:
  xiaoye-net:
    driver: bridge
